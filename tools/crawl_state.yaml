  - substrate: windows-evtx
    field: structure.provider-identification
    source-says: 'Events carry Provider Name + Provider GUID. For Security channel:

      Microsoft-Windows-Security-Auditing / {54849625-5478-4994-A5BA-3E3B0328C30D}.

      Task (12544 for logon family), Keywords bitmask (0x8020000000000000).

      '
    corpus-currently: missing
    note: Substrate structure doc captures BXML/chunk format but not the Provider/Task/Keywords identification axis. Useful for cross-event XPath queries.
    surfaced-by: seed-Security-4624
  - substrate: windows-ntfs-metadata
    field: structure.mft-record.header
    source-says: 'MFT record header is 42-56 bytes (48 on XP+): signature ''FILE'' at 0x00, fixup offset at 0x04, fixup count at 0x06, $LogFile LSN at 0x08, sequence at 0x10, hard-link count at 0x12, first-attribute offset at 0x14, flags at 0x16, real-size at 0x18, allocated-size at 0x1C, base-record reference at 0x20, next-attribute-ID at 0x28, (XP+) alignment at 0x2A, MFT record number at 0x2C'
    corpus-currently: partial
    note: substrate has top-level record-size and attribute-code enum but lacks byte-offset header layout — flatcap linux-ntfs supplies it
    surfaced-by: seed-MFT
  - substrate: windows-ntfs-metadata
    field: structure.fixup-mechanism
    source-says: 'Multi-sector transfer protection: last 2 bytes of every 512-byte sector in the record are replaced by an update-sequence placeholder; originals stored in fixup array at offset 4 (fixup-offset) with count at offset 6. After reading, parser must restore originals. ''BAAD'' signature appears when chkdsk detects mismatched fixup = sector-write corruption mid-transaction.'
    corpus-currently: missing
    note: critical to understanding 'BAAD' marker our MFT.md references; substrate doesn't document the mechanism
    surfaced-by: seed-MFT
  - substrate: windows-ntfs-metadata
    field: structure.reserved-entries
    source-says: 'Entries 0-11 reserved and named: 0=$MFT, 1=$MFTMirr (first-4 backup), 2=$LogFile, 3=$Volume, 4=$AttrDef, 5=. (root), 6=$Bitmap, 7=$Boot, 8=$BadClus, 9=$Secure (or $Quota on NT3.x-4.x), 10=$UpCase, 11=$Extend. Entries 12-15 reserved-in-use (empty). Entries 16-23 reserved-unused.'
    corpus-currently: partial
    note: substrate lists metafiles by name but not MFT-entry-number mapping
    surfaced-by: seed-MFT
  - substrate: windows-ntfs-metadata
    field: structure.attribute-codes (complete table)
    source-says: Full set including 0xD0 $EA_INFORMATION (8 bytes, resident), 0xE0 $EA (HPFS-compat extended attrs, non-resident), 0x100 $LOGGED_UTILITY_STREAM (resident — contains $EFS encryption + $TXF_DATA transaction metadata)
    corpus-currently: partial
    note: substrate table stops at 0xC0 — missing 0xD0, 0xE0, 0x100
    surfaced-by: seed-MFT
  - substrate: windows-ntfs-metadata
    field: format.filename-namespace-encoding
    source-says: '$FILE_NAME attribute has namespace byte: 0=POSIX (case-sensitive, allows most Unicode), 1=Win32 (case-insensitive, blocks ''*/:<>?\|''), 2=DOS (8.3 uppercase), 3=Win32+DOS (both names share one entry)'
    corpus-currently: missing
    note: not present in substrate or artifact — multi-namespace cases produce duplicate $FILE_NAME attributes per MFT record, forensically material
