    \  — cross-OS browser artifacts\n  /docs/Format%20specification.html — schema reference\n\nFinding a specific artifact:\n\
    \  1. Open the relevant YAML (typically windows.yaml).\n  2. Each artifact entry is separated by '---' YAML-document boundary.\n\
    \  3. Match by the `name:` field — e.g., `name: WindowsComputerName`.\n     Naming is not our project's naming (we use\
    \ USBSTOR.md; FA uses\n     WindowsUsbStorRegistryKey or similar).\n\nPer-entry fields available:\n  - name          (canonical\
    \ identifier, unique within the file)\n  - doc           (human prose description)\n  - sources[]     — typed list, each\
    \ with `type:` (REGISTRY_VALUE /\n                    REGISTRY_KEY / FILE / COMMAND / WMI / PATH / etc.)\n           \
    \         and `attributes:` (keys/values/paths/query)\n  - supported_os  (Windows / Linux / Darwin)\n  - urls[]      \
    \  (external references)\n  - conditions[]  (optional — dependencies on other artifacts)\n  - labels[]      (free-form\
    \ tags)\n  - provides[]    (what data this artifact yields)\n\nPitfalls:\n  - FA artifact names don't match DFIRCLI artifact\
    \ names. Cross-reference\n    by registry path / file path / event ID rather than by name.\n  - One FA entry can cover\
    \ multiple DFIRCLI artifacts (e.g., a single\n    REGISTRY_KEY with a path glob covers many subkeys).\n"
