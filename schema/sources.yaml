  access-guide: "Hub page links all 10 top-level Advanced Audit Policy categories, each\nwith multiple subcategory child pages.\n\
    \nNavigation from the hub:\n  1. Hub page: /en-us/windows/security/threat-protection/auditing/advanced-security-audit-policy-settings\n\
    \  2. Top-level categories: Account Logon / Account Management /\n     Detailed Tracking / DS Access / Logon/Logoff /\
    \ Object Access /\n     Policy Change / Privilege Use / System / Global Object Access Auditing.\n  3. Each category links\
    \ to ~6 subcategory pages. Subcategory URL pattern:\n     /en-us/windows/security/threat-protection/auditing/<subcategory-slug>\n\
    \     e.g., `audit-logon`, `audit-process-creation`, `audit-registry`.\n  4. Each subcategory page lists generated event\
    \ IDs with short\n     descriptions, default/recommended settings, GPO path.\n  5. Each event ID page (e.g., /auditing/event-4624)\
    \ has the full\n     event-data schema, XML template, field meanings, and version notes.\n\nPer-page fields available\
    \ (subcategory level): subcategory name, default\nsetting, recommended setting, generated event IDs (hyperlinked), GPO\
    \ path,\nGroup Policy reference. (Event-ID-level pages have deeper detail.)\n\nPitfalls:\n  - The canonical hub URL redirects\
    \ to /previous-versions/... and is marked\n    archived, but the content remains authoritative. Individual event-ID\n\
    \    pages are on the live /threat-protection/auditing/ path.\n  - Some event IDs (Defender 1116/1117/5001, SCM 7036/7045,\
    \ PowerShell\n    4103/4104) are NOT under this hub — they're in separate provider\n    channels documented elsewhere.\
    \ The hub covers only the Security log.\n"
