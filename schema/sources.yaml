- id: insiderthreatmatrix-repo
  author: Insider Threat Matrix
  year: n.d.
  title: Insider Threat Matrix — tier-3 behavior to tier-1 artifact mapping
  publisher: Insider Threat Matrix
  url: https://insiderthreatmatrix.org/
  apa: Insider Threat Matrix (n.d.). Insider Threat Matrix — tier-3 behavior to tier-1 artifact mapping. Insider Threat Matrix.
    https://insiderthreatmatrix.org/
  note: 'Cross-substrate behavior-to-artifact catalog. Top-level taxonomy: AR1-AR5 (Motive, Means, Preparation, Infringement,
    Anti-Forensics). Sub-sections coded MT/ME/PR/IF/AF. Plus ~130 Detections (DT) and Preventions (PV). Canonical tier-3 insider-threat
    reference.'
  access-guide: "Website layout at insiderthreatmatrix.org:\n\n  /articles/AR{1-5}                      — top-level article\
    \ category pages\n                                           AR1: Motive\n                                           AR2:\
    \ Means\n                                           AR3: Preparation\n                                           AR4:\
    \ Infringement\n                                           AR5: Anti-Forensics\n  /articles/AR{n}/sections/<CODE>    \
    \    — individual section pages within\n                                           an article. CODE prefix matches\n \
    \                                          the AR category:\n                                             MT### (Motive)\n\
    \                                             ME### (Means)\n                                             PR### (Preparation)\n\
    \                                             IF### (Infringement)\n                                             AF###\
    \ (Anti-Forensics)\n  /detections/DT###                      — detection articles\n  /preventions/PV###              \
    \       — prevention articles\n\nFinding content relevant to an artifact:\n  1. Start from the detection index (navigation\
    \ menu) and search for\n     artifact name or related registry path / file path.\n  2. Each detection/section page has:\
    \ ID, title, description, applicable\n     platforms (Windows/Linux/macOS), MITRE ATT&CK mapping, file/registry\n    \
    \ paths or log sources, example commands, cross-refs to related\n     detections and preventions.\n  3. Articles are themed\
    \ (e.g., AR3/sections/PR017 = Archive Data\n     preparation); detections and preventions are mechanism-specific.\n\n\
    Per-entry fields available: ID, title, description, applicable platforms,\nMITRE mapping, affected paths/log sources,\
    \ example commands, cross-refs,\nsubsections.\n\nPitfalls:\n  - URL case sensitivity: trailing-slash behavior is inconsistent.\
    \ Some\n    direct WebFetch URLs 404 while the same page resolves via the nav menu.\n    Verify the exact URL form before\
    \ scripting citations.\n  - Old DFIRCLI references used a hypothetical 'ART-N' scheme — the real\n    pattern is AR{1-5}\
    \ for articles and letter-prefixed codes for sections.\n  - Preventions (PV) and Detections (DT) use global numeric ranges;\n\
    \    sections (MT/ME/PR/IF/AF) use AR-scoped numbering.\n"
  kind: index-catalog
  authority: primary
  coverage:
    substrates: []
    artifacts: []
    scenarios-broadly: true
