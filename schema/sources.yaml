  note: 'Re-verified 2026-04-22. Plugin catalog confirmed live. Directly verified usbstor.pl exists at /plugins/usbstor.pl
    (Author: H. Carvey, Version 20200515, target: ControlSet00X\\Enum\\USBStor, extracts FirstInstallDate / InstallDate /
    LastArrivalDate / LastRemovalDate, FriendlyName, ParentIdPrefix, serial number). amcache.pl and usbdevices.pl also confirmed
    via direct URL. ~500 plugins total; each should be considered an individual leaf source. The /plugins/ tree URL cited
    here is the umbrella — appropriate as an index-catalog entry. Per-plugin citations would be richer attribution but add
    registry volume.'
  access-guide: "Navigate to github.com/keydet89/RegRipper3.0/blob/master/plugins/\n<name>.pl for a specific plugin. Plugin\
    \ file headers document: target\nhive, target registry path, version (YYYYMMDD), author, purpose. Each\nplugin is a standalone\
    \ per-artifact citation candidate.\nUSB-family plugin names observed:\n  usbstor.pl     → HKLM\\\\System\\\\CCS\\\\Enum\\\
    \\USBStor\n  usbdevices.pl  → HKLM\\\\System\\\\CCS\\\\Enum\\\\USB\n  mountdev.pl    → HKLM\\\\System\\\\MountedDevices\n\
    \  mp2.pl         → HKCU\\\\Software\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Explorer\\\\MountPoints2\n  emdmgmt.pl\
    \     → HKLM\\\\Software\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\EMDMgmt\n  portdev.pl     → Windows Portable\
    \ Devices\nRegistry-persistence: soft_run.pl, user_run.pl (Run / RunOnce),\nservices.pl (Services). Execution: appcompatcache.pl\
    \ (ShimCache),\namcache.pl (Amcache), bam.pl (BAM). Shell-activity: shellbags.pl,\nuserassist.pl, comdlg32.pl (OpenSave/LastVisited\
    \ PIDL MRUs),\nrecentdocs.pl, typedurls.pl, typedpaths.pl, muicache.pl,\nwordwheelquery.pl, runmru.pl.\nPitfall: not every\
    \ artifact has a plugin (e.g. newer Amcache\nInventoryDeviceContainer fields may need _tln variant). Version-date in\n\
