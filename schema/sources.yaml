- id: artefacts-help-repo
  author: Music, T. (qmusic)
  year: n.d.
  title: artefacts.help — Community Windows / Linux / Azure / AWS Forensic Artifact Reference
  publisher: artefacts.help
  url: https://www.artefacts.help/
  apa: Music, T. (qmusic) (n.d.). artefacts.help — Community Windows / Linux / Azure / AWS Forensic Artifact Reference. artefacts.help.
    https://www.artefacts.help/
  note: 'Community-maintained forensic artifact reference with stable per-page URLs. Windows section covers registry, ETW,
    text logs, NTFS artifacts. Hub pages group related artifacts (e.g., windows_registry_usb_activity.html covers USB, USBSTOR,
    MountedDevices, MountPoints2, WPDBUSENUM, EMDMgmt, WindowsPortableDevices in one document). RELIABILITY NOTE (2026-04-23
    per TypedURLs audit): artefacts.help/windows_registry_typedurls.html documents the WRONG registry path — uses TypedPaths''
    path (Software\Microsoft\Windows\CurrentVersion\Explorer\TypedPaths) rather than TypedURLs'' actual path (Software\Microsoft\Internet
    Explorer\TypedURLs). Do not cite this source for TypedURLs field-level claims; corroborate against MS Learn + Crucial
    Security + Forensafe. Other artefacts.help pages have not been field-checked at this granularity.'
  access-guide: "Repository at artefacts.help. Top nav: Windows / Linux / Azure/O365 / AWS + Others.\n\nFinding a specific\
    \ artifact:\n  1. URL pattern: /<platform>_<slug>.html\n     (e.g., /windows_registry_usb_activity.html, /windows_prefetch.html)\n\
    \  2. Some pages are single-artifact; some are hub pages covering multiple\n     related artifacts in one document (USB\
    \ activity page covers USBSTOR,\n     MountedDevices, MountPoints2, WPDBUSENUM, EMDMgmt, WindowsPortableDevices,\n   \
    \  etc. simultaneously).\n  3. Pages have: title with type/category tags, per-artifact subsections with\n     hive/location\
    \ tables, and a References section linking external sources.\n\nPer-page fields available: registry hive + key path, recoverable\
    \ field\nnames, timestamps (when applicable), cross-references to related pages.\n\nPitfalls:\n  - Hub pages lump related\
    \ artifacts together; cite the page URL for all\n    relevant DFIRCLI artifacts rather than assuming 1:1 page-to-artifact.\n\
    \  - Slug-to-artifact mapping requires content verification; some slugs don't\n    obviously align with DFIRCLI artifact\
    \ names.\n"
  kind: index-catalog
  authority: secondary
  coverage:
    substrates: []
    artifacts:
    - USBSTOR
    - USB-Enum
    - MountedDevices
    - WindowsPortableDevices
    - EMDMgmt
    - PartitionDiagnostic-1006
    - KernelPnP-400
    - KernelPnP-410
    - DeviceSetup-20001
    - BAM
    - DAM
    - Scheduled-Tasks
    - Services
    - OpenSavePidlMRU
    - LastVisitedPidlMRU
    - ShellBags
    - Amcache-InventoryApplicationFile
    - ShimCache
    - Prefetch
    - setupapi-dev-log
    - Recent-LNK
    - Desktop-LNK
    - Startup-LNK
    - TypedPaths
    mentions:
    - MountPoints2
    convergences-broadly: true
    convergences:
    - USED
    - DEVICE_CONNECTED
    - EXECUTED
    - VISITED_LOCATION
