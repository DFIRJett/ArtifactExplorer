  access-guide: "Repository layout: per-incident posts at thedfirreport.com/YYYY/MM/DD/<slug>/\n\nFinding content relevant\
    \ to a scenario:\n  1. Browse by ransomware family / attack vector / malware category\n     (tag filters on the main page).\n\
    \  2. Each post is a full case study covering the kill chain — initial\n     access, execution, persistence, lateral movement,\
    \ exfiltration, impact.\n  3. Posts consistently describe specific artifacts observed (registry\n     keys set, LNK files\
    \ written, Scheduled Tasks created, Services\n     installed, EVTX entries generated).\n  4. Cite per-post URL when a\
    \ specific case matches the scenario being\n     attributed — don't cite the site root.\n\nPer-post fields available:\
    \ date, title, TTPs, category tags, narrative\nprose, IOCs, artifact paths, Sigma rules.\n\nPitfalls:\n  - Post URLs include\
    \ the publication date — can't construct a URL from\n    slug alone. Navigate from the main page or a category index.\n\
    \  - Reports sometimes describe artifact paths with generic placeholders\n    (C:\\Users\\<user>\\...) that need normalization\
    \ when cited.\n  - Older posts (pre-2022) may reference artifact names that have since\n    been renamed in DFIRCLI's\
    \ corpus.\n"
  kind: index-catalog
  authority: secondary
  coverage:
    substrates: []
    artifacts: []
