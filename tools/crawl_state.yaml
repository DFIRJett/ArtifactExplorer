  - slug: rdp-bruteforce-to-interactive
    narrative-summary: 'Failed-logon-series (4625 type 10) → eventual 4624 type 10 success →

      4672 privilege assignment → interactive session (RDP). Common

      external-exposure post-incident reconstruction.

      '
    involved-artifacts:
    - Security-4625
    - Security-4624
    - Security-4672
    - TS-LSM-21
    - TS-RCM-1149
    surfaced-by: seed-Security-4624
  - slug: uac-split-token-attribution
    narrative-summary: 'Single interactive logon produces two 4624s (one non-elevated, one

      elevated), linked via TargetLinkedLogonId. Process-creation attribution

      across the two sessions requires walking ElevatedToken + LinkedLogonId.

      Tier-2/3 UAC-nuance scenario.

      '
    involved-artifacts:
    - Security-4624
    - Security-4672
    - Security-4688
    surfaced-by: seed-Security-4624
  - slug: timeline-reconstruction-via-triforce
    narrative-summary: 'Canonical tier-3 scenario — investigator receives disk image, must reconstruct

      file-operation chronology around incident window. Methodology: (1) MFTECmd parse

      $MFT for current state + $SI/$FN timestamps + deleted records. (2) LogFileParser

      on $LogFile for recent transactions with LSN. (3) MFTECmd on $UsnJrnl for rolling

      change log. (4) Cross-correlate via MFT-entry-number + LSN. Output: minute-level

      activity timeline. Anchored by Cowen Triforce methodology + flatcap + libfsntfs

      + Galhuber peer-reviewed research.

      '
    involved-artifacts:
    - MFT
    - UsnJrnl
    - LogFile
    surfaced-by: seed-MFT
  - slug: timestomp-detection-ntfs
    narrative-summary: 'Tier-3 scenario: investigator suspects timeline manipulation. Check progression:

      (1) $SI vs $FN MACB comparison per MFT record. (2) Nanosecond granularity analysis

      (Galhuber — zero-ns fractional = tool tell). (3) $UsnJrnl rename/move events that

      may have copied $SI into $FN. (4) $LogFile transactions around suspect timestamps.

      (5) Cross-check against execution-evidence (Prefetch, Amcache) time-of-first-run.

      Advanced case: SetMace detection requires external evidence.

      '
    involved-artifacts:
    - MFT
    - UsnJrnl
    - LogFile
    - Prefetch
    - Amcache
    surfaced-by: seed-MFT
  - slug: mft-deleted-file-recovery
    narrative-summary: 'Tier-3 scenario: recover deleted files from $MFT slack + $I30 directory-index

      slack + $UsnJrnl historical records. Steps: (1) MFTECmd on $MFT filtering

      in-use-flag==0 records. (2) $I30 (INDX) parsing for directory-index slack —

      retains deleted filenames even after MFT-record reuse. (3) $UsnJrnl carving for

      delete events + filename history. (4) $LogFile for truly-recent deletions.

      '
    involved-artifacts:
