    \   — parsers that process collected data\n  /README.md                         — format documentation\n\nFinding content\
    \ for a specific artifact:\n  1. Browse /Targets/ subdirectories by category:\n     ApplicationLogs / Antivirus / BrowsingHistory\
    \ / EvidenceOfExecution /\n     RegistryHives / WindowsBrowserBuiltin / LogFiles / Memory / etc.\n  2. Each .tkape file\
    \ is YAML-ish with fields: Description, Author, Version,\n     Id, RecreateDirectories, Category, Targets (Name + Category\
    \ + Path +\n     FileMasks + IsDirectory + Comment).\n  3. Modules follow the same pattern but specify BinaryName + CommandLine\
    \ +\n     ExportFormat instead of path globs.\n\nPer-entry fields available: Description, Author, Version, Id, Category,\n\
    paths/globs (Targets) or parser invocation (Modules).\n\nPitfalls:\n  - Heavy overlap with ForensicArtifacts repo — cite\
    \ the more specific one\n    for any given artifact.\n  - Some .tkape entries are \"compound targets\" (reference other\
