    rationale: 'TransmittedServices populated on 4624 following a 4648. Distinct from generic KERBEROS_DELEGATED: this is the attacker-misuse pattern (Kerberoasting / S4U2Self / S4U2Proxy).'
    surfaced-by: seed Security-4648
  scenario_proposal_queue:
  - slug: raspberry-robin-runonce-evasion
    narrative-summary: Raspberry Robin drops into RunOnce via key-rename-then-re-rename to evade rule-based detection. On next reboot the value self-deletes per normal RunOnce semantics but the malware's execution re-writes the value. Registry-only analysis finds only a benign-looking RunOnce entry with current state empty; forensic recovery requires yarp/del.pl on unallocated cells, Sysmon 13, or EDR-captured process-creation-with-command-line.
    involved-artifacts:
    - Run-Keys
    - Sysmon
    - Security-4657
    - Amcache-InventoryApplicationFile
    - Prefetch
    surfaced-by: seed-Run-Keys
  - slug: commodity-malware-run-key-persistence
    narrative-summary: Canonical persistence-by-Run-key pattern used by ILOVEYOU, Emotet, Qakbot, Ryuk, Hancitor, IcedID, DTrack (per Intel 471 + Huntress + ATT&CK). Attacker drops executable into %APPDATA% or %TEMP% and writes HKCU\...\Run\<name>. Every DFIR intro scenario lives here. Foundational T3 walkthrough — serves as the "how to analyze Run-keys end-to-end" scenario.
    involved-artifacts:
    - Run-Keys
    - Amcache-InventoryApplicationFile
    - Prefetch
    - Security-4688
    - MFT
    - ShimCache
    surfaced-by: seed-Run-Keys
  - slug: false-flag-persistence
    narrative-summary: 'Carvey 2023: threat actor adds a disabled value to HKCU Run as a decoy; analyst finds it, removes it, moves on. Real persistence lives elsewhere (Services / Scheduled Tasks / WMI subscriptions). Scenario trains the analyst to check Run-key VALUE STATE (enabled bit under Software\Microsoft\Windows\CurrentVersion\Explorer\ StartupApproved\Run) not just presence.'
    involved-artifacts:
    - Run-Keys
    - Services
    - Scheduled-Tasks
    - WMI-Subscriptions
    - StartupApproved
    surfaced-by: seed-Run-Keys
  - slug: jpcert-lateral-movement-reconstruction
    narrative-summary: 'Tier-3 case-study: reconstruct attacker lateral-movement chain across

      multiple Windows hosts using 4648→4624 LogonGuid correlation, 4672

      privilege-assignment, 4688 follow-on processes. Models the JPCERT v2

      methodology.

