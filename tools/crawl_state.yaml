repository_navigation:
  forensicartifacts-repo:
    focal-lookup: 'curl raw.githubusercontent.com/ForensicArtifacts/artifacts/main/artifacts/data/windows.yaml + grep by name: or registry path'
    horizontal: same YAML file - grep within
    pitfall: WebFetch summarizer truncates on large file; use direct curl
  regripper-plugins:
    focal-lookup: curl raw.githubusercontent.com/keydet89/RegRipper3.0/master/plugins/<name>.pl
    horizontal: direct URL for sibling plugin; filename lowercase no hyphens
    directory-listing: GitHub Git Trees API /git/trees/master?recursive=1 (filter path prefix plugins/)
    pitfall: GitHub directory-listing API may truncate; fall back to Trees API + JSON filter
  kape-files-repo:
    focal-lookup: GitHub Git Trees API; filter by keyword in path
    horizontal: 'compound .tkape files explicitly list child target filenames in Path: fields'
    pitfall: Many artifacts subsumed in broader targets (e.g., USBSTOR inside RegistryHives.tkape)
  insiderthreatmatrix-repo:
    focal-lookup: WebFetch /detections/DT<NNN>
    horizontal: each detection page lists related detections by ID
    discovery: WebFetch /detections for umbrella list of all detections
    pitfall: Trailing-slash variants inconsistent; id format is uppercase DT with 3 digits
  thedfirreport:
    focal-lookup: WebSearch site:thedfirreport.com <artifact-name>
    horizontal: category pages /category/<tag>/ list related posts
    pitfall: Case-study-oriented; incidental artifact mentions common but dedicated posts rare
