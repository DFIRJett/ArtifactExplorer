<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Convergence chord — DFIRCLI</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0b0d10;
    --fg: #e5e5e5;
    --dim: #8a8f98;
    --accent: #ffd166;
    --panel: #14171c;
    --border: #24282f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #wrap { display: grid; grid-template-columns: 240px 1fr 320px;
    grid-template-rows: 44px 1fr; height: 100vh; }
  header { grid-column: 1 / -1; display: flex; align-items: center; gap: 18px;
    padding: 0 18px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
  header .meta { color: var(--dim); font-size: 12px; }
  nav { background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 8px 0; }
  nav .group-title { padding: 8px 14px 4px; font-size: 11px; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.05em; }
  nav a { display: block; padding: 5px 14px; color: var(--fg); text-decoration: none;
    border-left: 2px solid transparent; font-size: 13px; }
  nav a:hover { background: rgba(255,255,255,0.04); }
  nav a.active { background: rgba(255,209,102,0.08); border-left-color: var(--accent); color: var(--accent); }
  nav a.unauthored { color: var(--dim); font-style: italic; }
  nav a .count { float: right; color: var(--dim); font-size: 11px; }
  main { position: relative; overflow: hidden; }
  #chord-svg { width: 100%; height: 100%; display: block; }
  aside { background: var(--panel); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 14px 16px; font-size: 13px; }
  aside h2 { font-size: 13px; font-weight: 600; margin: 0 0 6px; color: var(--accent); }
  aside h3 { font-size: 12px; font-weight: 600; margin: 14px 0 4px; color: var(--fg);
    text-transform: uppercase; letter-spacing: 0.04em; }
  aside p { margin: 0 0 10px; color: var(--dim); line-height: 1.5; }
  aside .pivot { margin: 8px 0 12px; padding: 8px 10px; background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--pivot-color, var(--dim)); border-radius: 2px; }
  aside .pivot .name { font-weight: 600; color: var(--pivot-color, var(--fg)); font-size: 12px; }
  aside .pivot .strength { font-size: 10px; color: var(--dim); text-transform: uppercase;
    margin-left: 6px; letter-spacing: 0.05em; }
  aside .pivot .desc { color: var(--dim); font-size: 11px; margin-top: 4px;
    line-height: 1.5; max-height: 84px; overflow: hidden; }
  aside .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
    background: rgba(255,255,255,0.05); color: var(--dim); margin: 2px 3px 0 0; }
  aside .exit { color: var(--accent); }
  text.artifact-label { fill: var(--fg); font-size: 11px; font-family: inherit; }
  text.artifact-label.exit-node { fill: var(--accent); font-weight: 600; }
  path.ribbon { fill-opacity: 0.55; stroke-width: 0; transition: fill-opacity 0.15s; }
  path.ribbon:hover { fill-opacity: 0.95; }
  path.ribbon.dimmed { fill-opacity: 0.08; }
  .arc { stroke: #000; stroke-width: 0.5; }
  .empty { color: var(--dim); text-align: center; padding: 40px 20px; font-style: italic; }
  .legend { position: absolute; top: 12px; left: 16px; background: rgba(20,23,28,0.9);
    padding: 10px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 11px; }
  .legend .item { display: flex; align-items: center; gap: 8px; margin: 2px 0; cursor: pointer; }
  .legend .item.dimmed { opacity: 0.35; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 2px; }
  .hint { position: absolute; bottom: 12px; left: 16px; color: var(--dim); font-size: 11px; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>Convergence chord diagram</h1>
    <span class="meta" id="meta">loading…</span>
  </header>
  <nav id="nav"></nav>
  <main>
    <svg id="chord-svg"></svg>
    <div class="legend" id="legend"></div>
    <div class="hint">hover a ribbon to isolate • click a pivot in the legend to toggle</div>
  </main>
  <aside id="aside"></aside>
</div>

<script>
// Per-pivot palette — hand-picked for contrast on dark bg.
// Order = insertion order of distinct concepts across the corpus (stable).
const PIVOT_PALETTE = [
  '#ef476f', '#06d6a0', '#118ab2', '#ffd166', '#8338ec',
  '#fb5607', '#3a86ff', '#a7c957', '#f77f00', '#b56576',
  '#00afb9', '#e07a5f', '#7209b7', '#90be6d'
];

const params = new URLSearchParams(window.location.search);
const initialConv = params.get('conv');

d3.json('data.json').then(data => {
  const convs = data.convergences || [];
  const authored = convs.filter(c => (c['join-chain']||[]).length > 0);
  const unauthored = convs.filter(c => !(c['join-chain']||[]).length);

  // Global pivot-concept color registry (consistent across views).
  const pivotColor = {};
  let ci = 0;
  for (const c of authored) {
    for (const p of c['join-chain']) {
      if (!(p.concept in pivotColor)) {
        pivotColor[p.concept] = PIVOT_PALETTE[ci % PIVOT_PALETTE.length];
        ci++;
      }
    }
  }

  buildNav(convs, authored, unauthored);
  const target = initialConv && convs.find(c => c.name === initialConv)
    ? initialConv
    : (authored[0] && authored[0].name);
  if (target) renderConvergence(target);
  else {
    document.getElementById('aside').innerHTML = '<p class="empty">No authored convergences found.</p>';
  }

  function buildNav(all, authored, unauthored) {
    const nav = document.getElementById('nav');
    let html = '<div class="group-title">Authored — ' + authored.length + '</div>';
    for (const c of authored.sort((a,b)=>a.name.localeCompare(b.name))) {
      const n = (c['join-chain']||[]).reduce((acc,p)=>acc + (p['artifacts-and-roles']||[]).length, 0);
      html += `<a href="?conv=${encodeURIComponent(c.name)}" data-conv="${c.name}">${c.name}<span class="count">${c['join-chain'].length} piv</span></a>`;
    }
    if (unauthored.length) {
      html += '<div class="group-title">Not yet authored — ' + unauthored.length + '</div>';
      for (const c of unauthored.sort((a,b)=>a.name.localeCompare(b.name))) {
        html += `<a href="?conv=${encodeURIComponent(c.name)}" class="unauthored" data-conv="${c.name}">${c.name}</a>`;
      }
    }
    nav.innerHTML = html;
    nav.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', ev => {
        ev.preventDefault();
        const name = a.dataset.conv;
        history.replaceState(null, '', '?conv=' + encodeURIComponent(name));
        renderConvergence(name);
      });
    });
  }

  function renderConvergence(name) {
    document.querySelectorAll('#nav a').forEach(a =>
      a.classList.toggle('active', a.dataset.conv === name));
    const conv = convs.find(c => c.name === name);
    if (!conv) return;

    document.getElementById('meta').textContent =
      `${name} — ceiling ${conv.yields?.ceiling || '?'} — ${(conv['join-chain']||[]).length} pivots`;

    const jc = conv['join-chain'] || [];
    if (!jc.length) {
      renderEmptyState(conv);
      return;
    }

    // Collect artifacts in a stable order — appearance order across pivots.
    const artifactOrder = [];
    const artifactSeen = new Set();
    for (const p of jc) {
      for (const ar of (p['artifacts-and-roles']||[])) {
        if (!artifactSeen.has(ar.artifact)) {
          artifactSeen.add(ar.artifact);
          artifactOrder.push(ar.artifact);
        }
      }
    }
    const n = artifactOrder.length;
    const exitSet = new Set(conv['exit-node'] || []);

    // Build ribbons: for each pivot, for each artifact pair sharing it,
    // emit a ribbon colored by pivot concept.
    const ribbons = [];
    for (const p of jc) {
      const arts = (p['artifacts-and-roles']||[]).map(ar => ar.artifact)
        .filter(a => artifactSeen.has(a));
      const idxs = arts.map(a => artifactOrder.indexOf(a));
      for (let i = 0; i < idxs.length; i++) {
        for (let j = i+1; j < idxs.length; j++) {
          ribbons.push({ source: idxs[i], target: idxs[j], pivot: p.concept,
                         color: pivotColor[p.concept], strength: p['join-strength'] });
        }
      }
    }

    drawChord(artifactOrder, exitSet, ribbons, jc);
    renderAside(conv, jc, exitSet);
    renderLegend(jc);
  }

  function drawChord(artifacts, exitSet, ribbons, pivots) {
    const svg = d3.select('#chord-svg');
    svg.selectAll('*').remove();
    const bbox = document.querySelector('main').getBoundingClientRect();
    const W = bbox.width, H = bbox.height;
    const R = Math.max(120, Math.min(W, H) / 2 - 110);

    const g = svg.append('g').attr('transform', `translate(${W/2},${H/2})`);
    const n = artifacts.length;
    const pad = 0.012;
    const arcSpan = (2*Math.PI - pad*n) / n;

    // Arcs around the ring — each artifact gets one segment.
    const arc = d3.arc().innerRadius(R).outerRadius(R + 14);
    const arcData = artifacts.map((name, i) => {
      const start = i * (arcSpan + pad);
      return { name, start, end: start + arcSpan, i };
    });
    g.selectAll('path.arc')
      .data(arcData)
      .enter().append('path')
      .attr('class', d => 'arc' + (exitSet.has(d.name) ? ' exit-node' : ''))
      .attr('d', d => arc({ startAngle: d.start, endAngle: d.end }))
      .attr('fill', d => exitSet.has(d.name) ? '#ffd166' : '#4a5058');

    // Labels
    g.selectAll('text.artifact-label')
      .data(arcData)
      .enter().append('text')
      .attr('class', d => 'artifact-label' + (exitSet.has(d.name) ? ' exit-node' : ''))
      .attr('transform', d => {
        const a = (d.start + d.end) / 2;
        const rot = a * 180/Math.PI - 90;
        const flip = a > Math.PI;
        return `rotate(${rot}) translate(${R+20},0)${flip ? ' rotate(180)' : ''}`;
      })
      .attr('text-anchor', d => (d.start + d.end)/2 > Math.PI ? 'end' : 'start')
      .attr('dy', '0.32em')
      .text(d => d.name);

    // Ribbons
    const ribbon = d3.ribbon().radius(R - 2);
    const mid = d => (arcData[d].start + arcData[d].end) / 2;
    const span = 0.0018; // ribbon endpoint spread at each artifact

    const ribbonG = g.append('g').attr('class', 'ribbons');
    ribbonG.selectAll('path.ribbon')
      .data(ribbons)
      .enter().append('path')
      .attr('class', 'ribbon')
      .attr('data-pivot', d => d.pivot)
      .attr('d', d => {
        const s = mid(d.source), t = mid(d.target);
        return ribbon({
          source: { startAngle: s - span, endAngle: s + span },
          target: { startAngle: t - span, endAngle: t + span }
        });
      })
      .attr('fill', d => d.color)
      .on('mouseenter', function(ev, d) {
        ribbonG.selectAll('path.ribbon').classed('dimmed', r => r !== d);
        d3.select(this).raise();
      })
      .on('mouseleave', () => ribbonG.selectAll('path.ribbon').classed('dimmed', false))
      .append('title')
      .text(d => `${d.pivot} (${d.strength})\n${artifacts[d.source]}  ↔  ${artifacts[d.target]}`);
  }

  function renderEmptyState(conv) {
    const svg = d3.select('#chord-svg');
    svg.selectAll('*').remove();
    const bbox = document.querySelector('main').getBoundingClientRect();
    svg.append('text')
      .attr('x', bbox.width/2).attr('y', bbox.height/2)
      .attr('text-anchor', 'middle').attr('fill', 'var(--dim)')
      .attr('font-style', 'italic')
      .text(`${conv.name}: join-chain not yet authored — `);
    svg.append('text')
      .attr('x', bbox.width/2).attr('y', bbox.height/2 + 20)
      .attr('text-anchor', 'middle').attr('fill', 'var(--dim)')
      .attr('font-size', '11px')
      .text(`${(conv['input-sources']||[]).reduce((a,s)=>a+(s.artifacts||[]).length,0)} participating artifact(s)`);
    document.getElementById('aside').innerHTML =
      `<h2>${conv.name}</h2><p>This convergence doesn't have an authored join-chain yet. The chord view is available once join-chain pivots + artifacts-and-roles are populated.</p>
      <h3>Current participants</h3>
      <p>${(conv['input-sources']||[]).flatMap(s=>s.artifacts||[]).map(a=>`<span class="tag">${a}</span>`).join('')}</p>`;
    document.getElementById('legend').innerHTML = '';
  }

  function renderAside(conv, jc, exitSet) {
    const aside = document.getElementById('aside');
    let html = `<h2>${conv.name}</h2>`;
    if (conv.summary) html += `<p>${conv.summary}</p>`;

    html += '<h3>Pivots</h3>';
    for (const p of jc) {
      const color = pivotColor[p.concept];
      const desc = (p.description || '').replace(/\n/g, ' ').trim();
      const shortDesc = desc.length > 260 ? desc.slice(0, 260) + '…' : desc;
      html += `<div class="pivot" style="--pivot-color:${color}">
        <span class="name">${p.concept}</span>
        <span class="strength">${p['join-strength']||''}</span>
        <div class="desc">${shortDesc}</div>
      </div>`;
    }

    if (exitSet.size) {
      html += '<h3>Exit nodes</h3><p>' +
        [...exitSet].map(n=>`<span class="tag exit">${n}</span>`).join(' ') + '</p>';
    }

    aside.innerHTML = html;
  }

  function renderLegend(jc) {
    const legend = document.getElementById('legend');
    legend.innerHTML = jc.map(p => {
      const color = pivotColor[p.concept];
      return `<div class="item" data-pivot="${p.concept}">
        <div class="swatch" style="background:${color}"></div>
        <div>${p.concept} <span style="color:var(--dim);font-size:10px">(${p['join-strength']})</span></div>
      </div>`;
    }).join('');
    legend.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        item.classList.toggle('dimmed');
        const dimmed = new Set([...legend.querySelectorAll('.item.dimmed')].map(i=>i.dataset.pivot));
        d3.selectAll('path.ribbon').classed('dimmed', d => dimmed.has(d.pivot));
      });
    });
  }

  // Redraw on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const active = document.querySelector('#nav a.active');
      if (active) renderConvergence(active.dataset.conv);
    }, 150);
  });
});
</script>
</body>
</html>
