- id: aboutdfir-nd-usb-devices-windows-artifact-r
  author: AboutDFIR
  year: n.d.
  title: USB Devices — Windows Artifact Reference
  publisher: AboutDFIR
  url: https://aboutdfir.com/toolsandartifacts/windows/usb-devices/
  apa: AboutDFIR (n.d.). USB Devices — Windows Artifact Reference. AboutDFIR. https://aboutdfir.com/toolsandartifacts/windows/usb-devices/
  note: 'Re-verified 2026-04-22. WebFetch returns 404 (bot-UA filtering typical of WordPress+CloudFront) but the page is live
    — confirmed by Google site: indexing and by cross-references from other aboutdfir posts. Scope is an umbrella on the Windows
    USB install-chain artifact family: USBSTOR, USB-Enum, MountedDevices, MountPoints2, WindowsPortableDevices, setupapi.dev.log,
    DeviceSetup 20001, Kernel-PnP 400/410. Site: probes confirm AboutDFIR ALSO covers Amcache, Prefetch, ShimCache, ShellBags,
    MFT, UsnJrnl, Security 4624, and Sysmon on OTHER pages, so authority as an index-catalog for the USB family specifically
    is appropriate.'
  access-guide: "AboutDFIR organizes artifacts under /toolsandartifacts/<os>/<topic>/.\nWebFetch is bot-blocked; use Google\
    \ site: search or a real browser.\nEach topic page is an umbrella — lists registry paths, log paths, event\nIDs, and canonical\
    \ tools per artifact, with minimal prose. For the USB\numbrella, the install-chain sequence runs:\n  setupapi.dev.log\
    \ (first install) → Kernel-PnP 410/400 (driver load) →\n  DeviceSetup 20001 (install complete) → USBSTOR subkey written\
    \ →\n  MountedDevices / MountPoints2 (drive-letter binding).\nPitfall: the site's internal 404 behavior for headless fetchers\
    \ masks\nlive pages — always verify via Google site: search before retracting.\n"
  kind: index-catalog
  authority: tertiary
  coverage:
    substrates:
    - windows-registry-hive
    - windows-evtx
    - windows-text-log
    artifacts:
    - USBSTOR
    - USB-Enum
    - MountedDevices
    - MountPoints2
    - WindowsPortableDevices
    - setupapi-dev-log
    - KernelPnP-400
    - KernelPnP-410
    - DeviceSetup-20001
    - DeviceSetup-20003
    - Security-6416
    - Amcache-InventoryDeviceContainer
    - Amcache-InventoryDevicePnp
    - EMDMgmt
    mentions:
    - DriverFrameworks-Operational
    convergences:
    - DEVICE_CONNECTED
    - USED
  sitemap-url: https://aboutdfir.com/sitemap.xml
